<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Molecule Studio — Interactive 3D Chemistry Visualizer</title>
<meta name="description" content="Explore 3D molecular structures interactively. Search any molecule, view proteins, balance equations, explore the periodic table. Free chemistry tool.">
<meta property="og:title" content="Molecule Studio v4.0">
<meta property="og:description" content="Free 3D chemistry visualizer — molecules, proteins, periodic table, equation balancer.">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#6366f1">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
<style>
:root{--bg:#0a0e1a;--sidebar-bg:#111827;--card-bg:#1f2937;--card-bg-2:#111827;--text:#f9fafb;--text-muted:#9ca3af;--text-faint:#6b7280;--accent:#6366f1;--accent-2:#8b5cf6;--accent-glow:rgba(99,102,241,.15);--border:#374151;--border-light:#1f2937;--success:#10b981;--error:#ef4444;--warning:#f59e0b;--radius:8px;--radius-lg:12px}
body.light-mode{--bg:#f8fafc;--sidebar-bg:#fff;--card-bg:#f1f5f9;--card-bg-2:#e2e8f0;--text:#0f172a;--text-muted:#64748b;--text-faint:#94a3b8;--accent:#4f46e5;--accent-2:#7c3aed;--accent-glow:rgba(79,70,229,.1);--border:#e2e8f0;--border-light:#f1f5f9;--success:#059669;--error:#dc2626;--warning:#d97706}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
#app{display:none;flex-direction:column;height:100vh}#main-layout{display:flex;flex:1;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}
/* Loading */
#loading-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.atom-anim{position:relative;width:80px;height:80px}.atom-anim .nucleus{width:14px;height:14px;background:var(--accent);border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 12px var(--accent)}
.orbit{position:absolute;inset:0;border:1.5px solid var(--accent);border-radius:50%;opacity:.4}
.orbit:nth-child(2){animation:orb1 2s linear infinite}.orbit:nth-child(3){animation:orb2 3s linear infinite;transform:rotate(60deg)}.orbit:nth-child(4){animation:orb3 4s linear infinite;transform:rotate(-60deg)}
.orbit::after{content:'';position:absolute;top:-3px;left:50%;width:6px;height:6px;background:var(--accent);border-radius:50%;transform:translateX(-50%)}
@keyframes orb1{to{transform:rotate(360deg)}}@keyframes orb2{to{transform:rotate(420deg)}}@keyframes orb3{to{transform:rotate(300deg)}}
#loading-screen h2{font-size:20px;font-weight:700;color:var(--text)}#loading-screen p{font-size:13px;color:var(--text-muted)}
/* Navbar */
#navbar{height:56px;background:var(--sidebar-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:10px}.nav-left svg{width:28px;height:28px}
.nav-title{font-weight:700;font-size:16px}.nav-badge{font-size:10px;background:var(--accent);color:#fff;padding:2px 6px;border-radius:4px;font-weight:600}
.nav-right{display:flex;align-items:center;gap:4px}
.nav-btn{background:none;border:1px solid var(--border);color:var(--text-muted);width:36px;height:36px;border-radius:var(--radius);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.nav-btn:hover{background:var(--accent-glow);color:var(--accent);border-color:var(--accent)}.nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.nav-btn-text{width:auto;padding:0 10px;font-size:12px;font-weight:500;gap:4px}
#menu-btn{display:none}
/* Sidebar */
#sidebar{width:300px;min-width:300px;background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;height:100%;display:flex;flex-direction:column}
.sb-section{border-bottom:1px solid var(--border)}
.sb-header{width:100%;background:none;border:none;color:var(--text);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
.sb-header:hover{background:var(--accent-glow)}.sb-arrow{font-size:10px;color:var(--text-faint);transition:transform .2s}
.sb-header.open .sb-arrow{transform:rotate(90deg)}.sb-body{display:none;padding:10px 14px 14px}.sb-body.open{display:block}
/* Search */
.search-wrap{display:flex;gap:6px}.search-input{flex:1;background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--radius);font-size:13px;font-family:inherit;outline:none}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
.search-btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;white-space:nowrap}
.search-btn:hover{opacity:.9}.search-btn:disabled{opacity:.4;cursor:not-allowed}
.ac-list{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);margin-top:4px;max-height:200px;overflow-y:auto;display:none}
.ac-item{padding:8px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border-light)}.ac-item:hover{background:var(--accent-glow);color:var(--accent)}.ac-item:last-child{border:none}
/* Molecule Info */
.mol-img{width:150px;height:150px;border-radius:var(--radius);background:#fff;display:block;margin:0 auto 10px;object-fit:contain}
.mol-name{font-size:18px;font-weight:700;margin-bottom:2px}.mol-formula{font-size:15px;color:var(--accent);font-weight:500;margin-bottom:8px}.mol-formula sub{font-size:.75em}
.prop-table{width:100%;font-size:12px;border-collapse:collapse}.prop-table td{padding:5px 0;border-bottom:1px solid var(--border-light)}.prop-table td:first-child{color:var(--text-muted)}.prop-table td:last-child{text-align:right;font-weight:500;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wiki-text{font-size:12px;color:var(--text-muted);font-style:italic;line-height:1.6;margin:8px 0}
.ext-links{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}.ext-link{font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;color:var(--text-muted);transition:all .15s}.ext-link:hover{color:var(--accent);border-color:var(--accent);text-decoration:none}
/* Library */
.lib-tabs{display:flex;gap:2px;margin-bottom:8px;flex-wrap:wrap}.lib-tab{font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text-muted);cursor:pointer;font-family:inherit}
.lib-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.lib-grid{display:flex;flex-direction:column;gap:4px;max-height:300px;overflow-y:auto}
.lib-card{display:flex;align-items:center;gap:8px;padding:8px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.lib-card:hover{border-color:var(--accent);background:var(--accent-glow)}.lib-card .lc-name{font-size:12px;font-weight:500;flex:1}.lib-card .lc-formula{font-size:10px;color:var(--text-faint)}
.cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
/* Proteins */
.prot-grid{display:flex;flex-direction:column;gap:4px;max-height:350px;overflow-y:auto}
.prot-card{display:flex;gap:8px;padding:8px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.prot-card:hover{border-color:var(--accent)}.prot-card img{width:50px;height:50px;border-radius:4px;object-fit:cover;background:var(--card-bg-2)}
.prot-info{flex:1;min-width:0}.prot-info h4{font-size:12px;font-weight:600}.prot-info .pdb-id{font-size:10px;color:var(--accent);font-weight:600}.prot-info p{font-size:10px;color:var(--text-faint);margin-top:2px}
/* Tools */
.tool-tabs{display:flex;gap:2px;margin-bottom:10px}.tool-tab{flex:1;text-align:center;font-size:11px;padding:6px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text-muted);cursor:pointer;font-family:inherit}
.tool-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}.tool-panel{display:none}.tool-panel.active{display:block}
.eq-input{width:100%;background:var(--card-bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:var(--radius);font-size:13px;font-family:'Courier New',monospace;margin-bottom:6px;outline:none}
.eq-input:focus{border-color:var(--accent)}.eq-result{padding:10px;background:var(--card-bg);border-radius:var(--radius);font-family:'Courier New',monospace;font-size:13px;margin:8px 0;color:var(--success);word-break:break-all}
.eq-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}.eq-chip{font-size:10px;padding:3px 6px;background:var(--card-bg);border:1px solid var(--border);border-radius:4px;cursor:pointer;color:var(--text-muted);font-family:inherit}.eq-chip:hover{border-color:var(--accent);color:var(--accent)}
.lip-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border-light)}.lip-pass{color:var(--success)}.lip-fail{color:var(--error)}
.lip-verdict{padding:6px 10px;border-radius:var(--radius);font-size:12px;font-weight:600;text-align:center;margin-top:6px}
.ctrl-group{margin-bottom:10px}.ctrl-label{font-size:11px;color:var(--text-muted);margin-bottom:4px;display:block}
.ctrl-radios{display:flex;flex-wrap:wrap;gap:4px}.ctrl-radio{font-size:11px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;background:none;color:var(--text-muted);cursor:pointer;font-family:inherit}
.ctrl-radio.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.ctrl-toggle{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.toggle-sw{width:36px;height:20px;background:var(--border);border-radius:10px;cursor:pointer;position:relative;transition:background .2s}
.toggle-sw.on{background:var(--accent)}.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s}
.toggle-sw.on::after{left:18px}
.bg-swatch{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);cursor:pointer;display:inline-block;margin-right:4px}.bg-swatch.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow)}
/* Viewer */
#viewer-area{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--bg)}
.viewer-tabs{display:flex;background:var(--sidebar-bg);border-bottom:1px solid var(--border);flex-shrink:0}
.viewer-tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-family:inherit}
.viewer-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.viewer-panel{flex:1;position:relative;display:none}.viewer-panel.active{display:flex;flex-direction:column}
#mol-viewer{flex:1;position:relative}
#molview-wrap{flex:1;position:relative}#molview-frame{width:100%;height:100%;border:none}
.split-wrap{flex:1;display:flex;gap:1px;background:var(--border)}.split-wrap>div{flex:1;background:var(--bg);position:relative}
#split-viewer{width:100%;height:100%}#split-frame{width:100%;height:100%;border:none}
.float-toolbar{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:10}
.float-btn{width:36px;height:36px;background:rgba(17,24,39,.85);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s}
.float-btn:hover{color:var(--accent);border-color:var(--accent)}
.bottom-strip{height:32px;background:var(--sidebar-bg);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;color:var(--text-faint);flex-shrink:0;gap:12px}
.atom-tooltip{position:absolute;background:rgba(0,0,0,.85);color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;pointer-events:none;z-index:20;display:none}
/* Periodic Table Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.pt-modal{background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius-lg);width:95vw;max-width:1100px;max-height:90vh;overflow:auto;padding:16px}
.pt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}.pt-header h2{font-size:18px;font-weight:700}
.pt-close{background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius)}
.pt-close:hover{background:var(--card-bg)}
.pt-filters{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.pt-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:2px;margin-bottom:8px}
.pt-cell{width:100%;aspect-ratio:.8;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:8px;position:relative;border:1px solid transparent;padding:1px}
.pt-cell:hover{transform:scale(1.15);z-index:10;border-color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pt-cell.dimmed{opacity:.15}.pt-cell .pt-num{font-size:7px;color:var(--text-faint);position:absolute;top:1px;left:2px}
.pt-cell .pt-sym{font-size:13px;font-weight:700;line-height:1}.pt-cell .pt-name{font-size:6px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.pt-cell .pt-mass{font-size:6px;color:var(--text-faint)}
.pt-lanthanides,.pt-actinides{display:grid;grid-template-columns:repeat(15,1fr);gap:2px;margin-top:4px;margin-left:calc(100%/18*3)}
.el-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--sidebar-bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;z-index:600;min-width:260px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.el-popup.open{display:block}
.el-popup h3{font-size:36px;font-weight:700;text-align:center}.el-popup h4{font-size:14px;text-align:center;color:var(--text-muted);margin-bottom:10px}
/* Footer */
.sb-footer{padding:10px 14px;font-size:11px;color:var(--text-faint);border-top:1px solid var(--border);margin-top:auto}
/* Toast */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 14px;border-radius:var(--radius);font-size:12px;display:flex;align-items:center;gap:6px;animation:slideUp .3s ease;min-width:200px;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.info{background:#1e3a5f;border:1px solid #2563eb;color:#93c5fd}.toast.success{background:#064e3b;border:1px solid var(--success);color:#6ee7b7}
.toast.error{background:#450a0a;border:1px solid var(--error);color:#fca5a5}.toast.warning{background:#451a03;border:1px solid var(--warning);color:#fcd34d}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
/* Sidebar overlay for mobile */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
/* Mobile */
@media(max-width:768px){
#menu-btn{display:flex}
#sidebar{position:fixed;left:-300px;top:56px;height:calc(100vh - 56px);z-index:50;transition:left .25s}
#sidebar.open{left:0}.sidebar-overlay.open{display:block}
.pt-grid{font-size:6px}.pt-cell .pt-sym{font-size:10px}.pt-cell .pt-name{display:none}
.nav-btn-text span{display:none}
}
</style>
</head>
<body>
<div id="loading-screen">
<div class="atom-anim"><div class="nucleus"></div><div class="orbit"></div><div class="orbit"></div><div class="orbit"></div></div>
<h2>Molecule Studio</h2><p>Initializing...</p>
</div>
<div id="app">
<div id="navbar">
<div class="nav-left">
<svg viewBox="0 0 100 100" width="28" height="28"><circle cx="50" cy="50" r="8" fill="var(--accent)"/><ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="var(--accent)" stroke-width="2" opacity=".6"/><ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="var(--accent)" stroke-width="2" opacity=".6" transform="rotate(60 50 50)"/><ellipse cx="50" cy="50" rx="40" ry="16" fill="none" stroke="var(--accent)" stroke-width="2" opacity=".6" transform="rotate(-60 50 50)"/></svg>
<span class="nav-title">Molecule Studio</span><span class="nav-badge">v4.0</span>
</div>
<div class="nav-right">
<button class="nav-btn" id="menu-btn" title="Menu">☰</button>
<button class="nav-btn" id="theme-btn" title="Toggle theme">🌙</button>
<button class="nav-btn" id="fs-btn" title="Fullscreen">⛶</button>
<button class="nav-btn nav-btn-text" id="pt-btn" title="Periodic Table">⚛ <span>Table</span></button>
</div>
</div>
<div id="main-layout">
<div class="sidebar-overlay" id="sidebar-overlay"></div>
<div id="sidebar">
<!-- Search -->
<div class="sb-section"><button class="sb-header open" data-sec="search">🔍 Search Molecule<span class="sb-arrow">▶</span></button>
<div class="sb-body open" id="sec-search">
<div class="search-wrap"><input class="search-input" id="mol-search" placeholder="Caffeine, aspirin, water..."><button class="search-btn" id="mol-search-btn">Search</button></div>
<div class="ac-list" id="ac-list"></div>
</div></div>
<!-- Info -->
<div class="sb-section"><button class="sb-header open" data-sec="info">ℹ️ Molecule Info<span class="sb-arrow">▶</span></button>
<div class="sb-body open" id="sec-info"><div id="mol-info-content"><p style="font-size:12px;color:var(--text-faint)">Search a molecule to see details.</p></div></div></div>
<!-- Library -->
<div class="sb-section"><button class="sb-header" data-sec="library">📚 Library<span class="sb-arrow">▶</span></button>
<div class="sb-body" id="sec-library"><div class="lib-tabs" id="lib-tabs"></div><input class="search-input" id="lib-filter" placeholder="Filter..." style="margin-bottom:6px"><div class="lib-grid" id="lib-grid"></div></div></div>
<!-- Proteins -->
<div class="sb-section"><button class="sb-header" data-sec="proteins">🧬 Proteins<span class="sb-arrow">▶</span></button>
<div class="sb-body" id="sec-proteins"><div class="prot-grid" id="prot-grid"></div></div></div>
<!-- Tools -->
<div class="sb-section"><button class="sb-header" data-sec="tools">🔧 Chemistry Tools<span class="sb-arrow">▶</span></button>
<div class="sb-body" id="sec-tools">
<div class="tool-tabs"><button class="tool-tab active" data-tool="eq">Balancer</button><button class="tool-tab" data-tool="calc">Calculator</button><button class="tool-tab" data-tool="ctrl">Viewer</button></div>
<div class="tool-panel active" id="tool-eq">
<input class="eq-input" id="eq-input" placeholder="H2 + O2 -> H2O">
<button class="search-btn" style="width:100%" id="eq-btn">Balance</button>
<div id="eq-result"></div>
<div class="eq-chips" id="eq-chips"></div>
</div>
<div class="tool-panel" id="tool-calc"><div id="calc-content"><p style="font-size:12px;color:var(--text-faint)">Load a molecule first.</p></div></div>
<div class="tool-panel" id="tool-ctrl"><div id="ctrl-content"></div></div>
</div></div>
<div class="sb-footer">Data: PubChem · PDB · Wikipedia · NIST</div>
</div>
<!-- Viewer -->
<div id="viewer-area">
<div class="viewer-tabs"><button class="viewer-tab active" data-view="3d">3D View</button><button class="viewer-tab" data-view="molview">MolView</button><button class="viewer-tab" data-view="split">Split View</button></div>
<div class="viewer-panel active" id="vp-3d">
<div id="mol-viewer"></div>
<div class="float-toolbar"><button class="float-btn" id="btn-screenshot" title="Screenshot">📷</button><button class="float-btn" id="btn-reset" title="Reset view">🔄</button><button class="float-btn" id="btn-vfull" title="Fullscreen">⛶</button><button class="float-btn" id="btn-share" title="Share link">🔗</button><button class="float-btn" id="btn-spin" title="Auto-rotate">🔁</button></div>
<div class="atom-tooltip" id="atom-tooltip"></div>
</div>
<div class="viewer-panel" id="vp-molview"><div id="molview-wrap"><iframe id="molview-frame" src="about:blank" allow="fullscreen"></iframe></div></div>
<div class="viewer-panel" id="vp-split"><div class="split-wrap"><div><div id="split-viewer" style="width:100%;height:100%"></div></div><div><iframe id="split-frame" src="about:blank" allow="fullscreen" style="width:100%;height:100%"></iframe></div></div></div>
<div class="bottom-strip" id="bottom-strip">Molecule: — | Atoms: — | Bonds: —</div>
</div>
</div>

function showToast(msg,type='info',dur=3000){
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;

// PubChem Autocomplete
let acTimer=null;
function setupAutocomplete(){
  const inp=document.getElementById('mol-search'),list=document.getElementById('ac-list');
  inp.addEventListener('input',()=>{
    clearTimeout(acTimer);const q=inp.value.trim();
    if(q.length<2){list.style.display='none';return;}
    acTimer=setTimeout(async()=>{
      try{
        const r=await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/autocomplete/compound/${encodeURIComponent(q)}/JSON?limit=8`);
        const d=await r.json();const items=d.dictionary_terms?.compound||[];
        if(!items.length){list.style.display='none';return;}
        list.innerHTML=items.map(i=>`<div class="ac-item">${i}</div>`).join('');
        list.style.display='block';
        list.querySelectorAll('.ac-item').forEach(el=>el.addEventListener('click',()=>{
          inp.value=el.textContent;list.style.display='none';searchMolecule(el.textContent);
        }));
      }catch(e){list.style.display='none';}
    },300);
  });

// Main search
async function searchMolecule(name){
  console.log('Searching:',name);
  document.getElementById('mol-search').value=name;
  document.getElementById('mol-search-btn').disabled=true;
  document.getElementById('mol-search-btn').textContent='...';
  try{
    const cr=await fetch(`${PUB}/compound/name/${encodeURIComponent(name)}/cids/JSON`);
    if(!cr.ok) throw new Error('Molecule not found. Try a different name.');
    const cd=await cr.json();const cid=cd.IdentifierList.CID[0];
    console.log('CID:',cid);
    let sdf='',is3d=true;
    try{const sr=await fetch(`${PUB}/compound/cid/${cid}/SDF?record_type=3d`);
      if(sr.ok)sdf=await sr.text();else throw 0;
    }catch(e){
      const sr=await fetch(`${PUB}/compound/cid/${cid}/SDF`);
      if(sr.ok){sdf=await sr.text();is3d=false;}
    }
    if(!is3d) showToast('Showing 2D structure (3D not available)','warning');
    
    const pr=await fetch(`${PUB}/compound/cid/${cid}/property/MolecularFormula,MolecularWeight,IUPACName,XLogP,ExactMass,HBondDonorCount,HBondAcceptorCount,RotatableBondCount,TPSA,CanonicalSMILES/JSON`);
    const pd=await pr.json();const p=pd.PropertyTable.Properties[0];
    
    let cas='';
    try{const sr=await fetch(`${PUB}/compound/cid/${cid}/synonyms/JSON`);const sd=await sr.json();
      const syns=sd.InformationList?.Information?.[0]?.Synonym||[];
      cas=syns.find(s=>/^\d{2,7}-\d{2}-\d$/.test(s))||'';
    }catch(e){}
    
    let wiki=null;
    try{const wn=getWikiName(name);const wr=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wn)}`);
      if(wr.ok){const wd=await wr.json();if(wd.extract&&wd.extract.length>30)wiki={text:wd.extract,thumb:wd.thumbnail?.source||null};}
    }catch(e){}
    
    currentMol={name,cid,...p,cas,wiki,smiles:p.CanonicalSMILES};currentSDF=sdf;
    loadSDF(sdf);updateInfo();updateCalc();updateMolView(p.CanonicalSMILES);
    history.pushState(null,'','?mol='+encodeURIComponent(name));
    showToast(name+' loaded','success');
  }catch(e){
    console.error(e);showToast(e.message||'Error loading molecule','error');
  }finally{
    document.getElementById('mol-search-btn').disabled=false;
    document.getElementById('mol-search-btn').textContent='Search';
  }
}

function loadSDF(sdf){
  viewer.clear();viewer.addModel(sdf,'sdf');

    function(a){const tt=document.getElementById('atom-tooltip');tt.textContent=`${a.elem} (#${a.serial})`;tt.style.display='block';tt.style.left=(event?.clientX||0)+10+'px';tt.style.top=(event?.clientY||0)-30+'px';},
    function(){document.getElementById('atom-tooltip').style.display='none';}
  );
  viewer.zoomTo();viewer.render();
  if(splitViewer){splitViewer.clear();splitViewer.addModel(sdf,'sdf');splitViewer.setStyle({},{stick:{},sphere:{scale:0.3}});splitViewer.zoomTo();splitViewer.render();}
  const atoms=viewer.getModel()?.selectedAtoms()||[];
  const bonds=atoms.reduce((s,a)=>s+(a.bonds?.length||0),0)/2;
  document.getElementById('bottom-strip').textContent=`Molecule: ${currentMol.name||'—'} | Atoms: ${atoms.length} | Bonds: ${Math.round(bonds)}`;
}

// Equation Balancer
function balanceEquation(str){
  const sides=str.split(/->|=|→/);
  if(sides.length!==2)return{error:'Use format: A + B -> C'};
  const reactants=sides[0].split('+').map(s=>s.trim()).filter(Boolean);
  const products=sides[1].split('+').map(s=>s.trim()).filter(Boolean);
  function parseFormula(f){const el={};let i=0;f=f.replace(/\s/g,'');
    while(i<f.length){if(f[i]>='A'&&f[i]<='Z'){let sym=f[i++];while(i<f.length&&f[i]>='a'&&f[i]<='z')sym+=f[i++];
    let num='';while(i<f.length&&f[i]>='0'&&f[i]<='9')num+=f[i++];el[sym]=(el[sym]||0)+(parseInt(num)||1);}else i++;}return el;}
  const allCpd=[...reactants,...products],parsed=allCpd.map(parseFormula);
  const elements=[...new Set(parsed.flatMap(p=>Object.keys(p)))];
  const n=allCpd.length;
  function check(c){return elements.every(el=>{let s=0;allCpd.forEach((_,i)=>s+=(i<reactants.length?1:-1)*(parsed[i][el]||0)*c[i]);return s===0;});}
  function brute(d,arr,max){if(d===n)return check(arr)?[...arr]:null;for(let v=1;v<=max;v++){const r=brute(d+1,[...arr,v],max);if(r)return r;}return null;}
  const c=brute(0,[],12);
  if(!c)return{error:'Could not balance. Check formula spelling.'};
  const fmt=(cpds,co,off)=>cpds.map((c,i)=>(co[i+off]>1?co[i+off]:'')+c).join(' + ');
  return{balanced:fmt(reactants,c,0)+' → '+fmt(products,c,reactants.length)};
}

// Property Calculator
function updateCalc(){
  const el=document.getElementById('calc-content');
  const m=currentMol;
  if(!m.MolecularWeight){el.innerHTML='<p style="font-size:12px;color:var(--text-faint)">Load a molecule first.</p>';return;}
  const mw=parseFloat(m.MolecularWeight)||0,hbd=m.HBondDonorCount||0,hba=m.HBondAcceptorCount||0,xlogp=m.XLogP!=null?m.XLogP:0;
  const lip={mw:mw<=500,hbd:hbd<=5,hba:hba<=10,logp:xlogp<=5};
  lip.drugLike=[lip.mw,lip.hbd,lip.hba,lip.logp].filter(Boolean).length>=3;
  let h=`<div style="font-size:12px;font-weight:600;margin-bottom:6px">Lipinski's Rule of Five</div>`;
  const rw=(name,pass,val)=>`<div class="lip-row"><span>${pass?'✓':'✗'} ${name}</span><span class="${pass?'lip-pass':'lip-fail'}">${val}</span></div>`;
  h+=rw('MW ≤ 500',lip.mw,mw.toFixed(1)+' g/mol');
  h+=rw('XLogP ≤ 5',lip.logp,xlogp);
  h+=rw('HBD ≤ 5',lip.hbd,hbd);
  h+=rw('HBA ≤ 10',lip.hba,hba);
  h+=`<div class="lip-verdict" style="background:${lip.drugLike?'rgba(16,185,129,.1);color:var(--success)':'rgba(239,68,68,.1);color:var(--error)'}">${lip.drugLike?'✓ Drug-like':'✗ Not drug-like'}</div>`;
  if(m.TPSA!=null) h+=`<div style="margin-top:8px;font-size:11px;color:var(--text-muted)">TPSA: ${m.TPSA} Å² · Rotatable: ${m.RotatableBondCount||0}</div>`;
  el.innerHTML=h;
}

let ptFilter='all';
function buildPeriodicTable(){
  const grid=document.getElementById('pt-grid');
  // Build filters
  document.getElementById('pt-filters').innerHTML=['All','Metals','Nonmetals','Noble gases'].map(f=>
    `<button class="lib-tab${f==='All'?' active':''}" data-ptf="${f.toLowerCase()}">${f}</button>`
  ).join('');
  document.querySelectorAll('[data-ptf]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('[data-ptf]').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    ptFilter=b.dataset.ptf;applyPTFilter();
  }));
  // Render main grid cells
  grid.innerHTML='';
  EL.forEach(([num,sym,name,mass,cat,per,grp])=>{
    const cell=document.createElement('div');cell.className='pt-cell';
    cell.style.gridColumn=grp;cell.style.gridRow=per;
    cell.style.background=PT_CAT_COLORS[cat];cell.style.color='#1a1a2e';
    cell.innerHTML=`<span class="pt-num">${num}</span><span class="pt-sym">${sym}</span><span class="pt-name">${name}</span><span class="pt-mass">${mass}</span>`;
    cell.dataset.cat=''+cat;cell.title=`${name} (${sym}) - ${mass}`;
    cell.addEventListener('click',()=>showElementPopup(num,sym,name,mass,cat));
    grid.appendChild(cell);
  });
  // Lanthanides & Actinides
  const lanGrid=document.getElementById('pt-lan'),actGrid=document.getElementById('pt-act');
  LANTHANIDES.forEach(([num,sym,name,mass])=>{
    const cell=document.createElement('div');cell.className='pt-cell';
    cell.style.background=PT_CAT_COLORS[8];cell.style.color='#1a1a2e';cell.dataset.cat='8';
    cell.innerHTML=`<span class="pt-num">${num}</span><span class="pt-sym">${sym}</span><span class="pt-name">${name}</span><span class="pt-mass">${mass}</span>`;
    cell.addEventListener('click',()=>showElementPopup(num,sym,name,mass,8));lanGrid.appendChild(cell);
  });
  ACTINIDES.forEach(([num,sym,name,mass])=>{
    const cell=document.createElement('div');cell.className='pt-cell';
    cell.style.background=PT_CAT_COLORS[9];cell.style.color='#1a1a2e';cell.dataset.cat='9';
    cell.innerHTML=`<span class="pt-num">${num}</span><span class="pt-sym">${sym}</span><span class="pt-name">${name}</span><span class="pt-mass">${mass}</span>`;
    cell.addEventListener('click',()=>showElementPopup(num,sym,name,mass,9));actGrid.appendChild(cell);
  });
}
function applyPTFilter(){
  const metals=new Set([0,1,2,3,8,9]),nonmetals=new Set([5,6]),noble=new Set([7]);
  document.querySelectorAll('.pt-cell').forEach(c=>{
    const cat=parseInt(c.dataset.cat);let show=true;
    if(ptFilter==='metals') show=metals.has(cat);
    else if(ptFilter==='nonmetals') show=nonmetals.has(cat)||cat===4;
    else if(ptFilter==='noble gases') show=noble.has(cat);
    c.classList.toggle('dimmed',!show);
  });
}
function showElementPopup(num,sym,name,mass,cat){
  const el=document.getElementById('el-popup');
  el.innerHTML=`<h3 style="color:${PT_CAT_COLORS[cat]?.replace('f','8')}">${sym}</h3><h4>${name}</h4>
  <table class="prop-table"><tr><td>Atomic Number</td><td>${num}</td></tr><tr><td>Atomic Mass</td><td>${mass} u</td></tr>
  <tr><td>Category</td><td>${PT_CATS[cat]?.replace(/-/g,' ')}</td></tr></table>
  <button class="search-btn" style="width:100%;margin-top:10px" onclick="document.getElementById('el-popup').classList.remove('open');searchMolecule('${name}')">Search compounds</button>
  <button style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px" onclick="document.getElementById('el-popup').classList.remove('open')">✕</button>`;
  el.classList.add('open');
}

// Viewer Controls
function buildViewerControls(){
  const el=document.getElementById('ctrl-content');
  el.innerHTML=`
  <div class="ctrl-group"><span class="ctrl-label">Representation</span><div class="ctrl-radios" id="rep-radios">
    <button class="ctrl-radio active" data-rep="bs">Ball & Stick</button><button class="ctrl-radio" data-rep="stick">Stick</button>
    <button class="ctrl-radio" data-rep="sphere">Sphere</button><button class="ctrl-radio" data-rep="line">Line</button></div></div>
  <div class="ctrl-group"><span class="ctrl-label">Background</span><div>
    <span class="bg-swatch active" data-bg="black" style="background:#000"></span>
    <span class="bg-swatch" data-bg="white" style="background:#fff"></span>
    <span class="bg-swatch" data-bg="gray" style="background:#374151"></span></div></div>
  <div class="ctrl-group"><div class="ctrl-toggle"><span class="toggle-sw" id="tgl-spin"></span><span>Auto-rotate</span></div></div>
  <div class="ctrl-group"><div class="ctrl-toggle"><span class="toggle-sw" id="tgl-h"></span><span>Show hydrogens</span></div></div>`;
  // Rep
  el.querySelectorAll('[data-rep]').forEach(b=>b.addEventListener('click',()=>{
    el.querySelectorAll('[data-rep]').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    const r=b.dataset.rep;
    let style={};
    if(r==='bs') style={stick:{},sphere:{scale:0.3}};
    else if(r==='stick') style={stick:{radius:0.15}};
    else if(r==='sphere') style={sphere:{scale:1}};
    else style={line:{}};
    viewer.setStyle({},style);viewer.render();
    if(splitViewer){splitViewer.setStyle({},style);splitViewer.render();}
  }));
  // Background
  el.querySelectorAll('[data-bg]').forEach(b=>b.addEventListener('click',()=>{
    el.querySelectorAll('[data-bg]').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    const c=b.dataset.bg==='black'?'black':b.dataset.bg==='white'?'white':'#374151';
    viewer.setBackgroundColor(c);if(splitViewer)splitViewer.setBackgroundColor(c);
  }));
  // Spin toggle
  document.getElementById('tgl-spin').addEventListener('click',function(){
    this.classList.toggle('on');spinning=!spinning;viewer.spin(spinning?'y':false);
    if(splitViewer)splitViewer.spin(spinning?'y':false);
  });
  // Hydrogen toggle
  let showH=false;
  document.getElementById('tgl-h').addEventListener('click',function(){
    this.classList.toggle('on');showH=!showH;
    // This is a simple toggle approach
    if(!showH) viewer.setStyle({elem:'H'},{sphere:{scale:0}});
    else{const active=el.querySelector('[data-rep].active');active?.click();}
    viewer.render();
  });
}

// Build Library
function buildLibrary(){
  const tabs=document.getElementById('lib-tabs');
  tabs.innerHTML=['All','Common','Drugs','Nutrients','Biomolecules'].map(t=>
    `<button class="lib-tab${t==='All'?' active':''}" data-lcat="${t.toLowerCase()}">${t}</button>`
  ).join('');
  function render(cat='all',filter=''){
    const grid=document.getElementById('lib-grid');
    grid.innerHTML=MOLECULES.filter(m=>(cat==='all'||m.cat===cat)&&(!filter||m.n.toLowerCase().includes(filter))).map(m=>
      `<div class="lib-card" data-cid="${m.cid}" data-name="${m.n}" data-smiles="${m.smiles||''}">
        <span class="cat-dot" style="background:${CAT_COLORS[m.cat]}"></span>
        <span class="lc-name">${m.n}</span><span class="lc-formula">${m.f}</span></div>`
    ).join('');
    grid.querySelectorAll('.lib-card').forEach(c=>c.addEventListener('click',()=>loadByCID(c.dataset.cid,c.dataset.name,c.dataset.smiles)));
  }
  render();
  tabs.querySelectorAll('.lib-tab').forEach(b=>b.addEventListener('click',()=>{
    tabs.querySelectorAll('.lib-tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
    render(b.dataset.lcat,document.getElementById('lib-filter').value.trim().toLowerCase());
  }));
  document.getElementById('lib-filter').addEventListener('input',e=>{
    const active=tabs.querySelector('.lib-tab.active');
    render(active?.dataset.lcat||'all',e.target.value.trim().toLowerCase());
  });
}

// Build Proteins
function buildProteins(){
  const grid=document.getElementById('prot-grid');
  grid.innerHTML=PROTEINS.map(p=>`<div class="prot-card" data-pdb="${p.pdb}" data-name="${p.n}">
    <img src="https://cdn.rcsb.org/images/structures/${p.pdb.toLowerCase()}/${p.pdb}/${p.pdb}_assembly-1.jpeg" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2250%22><rect fill=%22%231f2937%22 width=%2250%22 height=%2250%22/><text x=%2225%22 y=%2230%22 fill=%22%236b7280%22 text-anchor=%22middle%22 font-size=%2212%22>🧬</text></svg>'">
    <div class="prot-info"><h4>${p.n}</h4><span class="pdb-id">${p.pdb}</span><p>${p.desc}</p></div></div>`).join('');
  grid.querySelectorAll('.prot-card').forEach(c=>c.addEventListener('click',()=>loadProtein(c.dataset.pdb,c.dataset.name)));
}

// === INITIALIZATION ===
document.addEventListener('DOMContentLoaded',function(){
  console.log('Molecule Studio v4.0 initializing...');
  
  // Theme
  if(localStorage.getItem('ms-theme')==='light') document.body.classList.add('light-mode');
  document.getElementById('theme-btn').addEventListener('click',()=>{
    document.body.classList.toggle('light-mode');
    localStorage.setItem('ms-theme',document.body.classList.contains('light-mode')?'light':'dark');
    document.getElementById('theme-btn').textContent=document.body.classList.contains('light-mode')?'☀️':'🌙';
  });
  
  // Sidebar collapse
  document.querySelectorAll('.sb-header').forEach(h=>h.addEventListener('click',()=>{
    h.classList.toggle('open');const body=h.nextElementSibling;body.classList.toggle('open');
  }));
  
  // Sidebar mobile
  document.getElementById('menu-btn').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('open');
  });
  document.getElementById('sidebar-overlay').addEventListener('click',()=>{
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('open');
  });
  
  // Search
  setupAutocomplete();
  document.getElementById('mol-search-btn').addEventListener('click',()=>searchMolecule(document.getElementById('mol-search').value.trim()));
  document.getElementById('mol-search').addEventListener('keydown',e=>{if(e.key==='Enter')searchMolecule(e.target.value.trim());});
  
  // Viewer tabs
  document.querySelectorAll('.viewer-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.viewer-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    document.querySelectorAll('.viewer-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('vp-'+t.dataset.view).classList.add('active');
    if(t.dataset.view==='split'&&!splitViewer){
      splitViewer=$3Dmol.createViewer(document.getElementById('split-viewer'),{backgroundColor:'black',antialias:true});
      if(currentSDF){splitViewer.addModel(currentSDF,'sdf');splitViewer.setStyle({},{stick:{},sphere:{scale:0.3}});splitViewer.zoomTo();splitViewer.render();}
    }
  }));
  
  // Tool tabs
  document.querySelectorAll('.tool-tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.tool-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    document.querySelectorAll('.tool-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById('tool-'+t.dataset.tool).classList.add('active');
  }));
  
  // Equation balancer
  document.getElementById('eq-btn').addEventListener('click',()=>{
    const r=balanceEquation(document.getElementById('eq-input').value);
    document.getElementById('eq-result').innerHTML=r.error?`<span style="color:var(--error)">${r.error}</span>`:`<span>${r.balanced}</span>`;
  });
  document.getElementById('eq-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('eq-btn').click();});
  document.getElementById('eq-chips').innerHTML=EQ_EXAMPLES.map(e=>`<button class="eq-chip">${e}</button>`).join('');
  document.querySelectorAll('.eq-chip').forEach(c=>c.addEventListener('click',()=>{document.getElementById('eq-input').value=c.textContent;document.getElementById('eq-btn').click();}));
  
  // Floating toolbar
  document.getElementById('btn-screenshot').addEventListener('click',()=>{
    const uri=viewer.pngURI();const a=document.createElement('a');a.href=uri;a.download=(currentMol.name||'molecule')+'.png';a.click();showToast('Screenshot saved','success');
  });
  document.getElementById('btn-reset').addEventListener('click',()=>{viewer.zoomTo();viewer.render();showToast('View reset','info');});
  document.getElementById('btn-vfull').addEventListener('click',()=>{const el=document.getElementById('viewer-area');el.requestFullscreen?.();});
  document.getElementById('btn-share').addEventListener('click',()=>{navigator.clipboard.writeText(window.location.href).then(()=>showToast('Link copied!','success'));});
  document.getElementById('btn-spin').addEventListener('click',()=>{spinning=!spinning;viewer.spin(spinning?'y':false);if(splitViewer)splitViewer.spin(spinning?'y':false);});
  
  // Fullscreen
  document.getElementById('fs-btn').addEventListener('click',()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen());
  
  // Periodic table
  document.getElementById('pt-btn').addEventListener('click',()=>document.getElementById('pt-modal').classList.add('open'));
  document.getElementById('pt-close').addEventListener('click',()=>document.getElementById('pt-modal').classList.remove('open'));
  document.getElementById('pt-modal').addEventListener('click',e=>{if(e.target===document.getElementById('pt-modal'))document.getElementById('pt-modal').classList.remove('open');});
  
  // Build UI
  buildLibrary();buildProteins();buildPeriodicTable();buildViewerControls();
  
  // Init 3Dmol viewer
  viewer=$3Dmol.createViewer(document.getElementById('mol-viewer'),{backgroundColor:'black',antialias:true,preserveDrawingBuffer:true});
  
  // Loading screen → App
  setTimeout(()=>{
    document.getElementById('loading-screen').style.opacity='0';
    document.getElementById('loading-screen').style.transition='opacity 0.5s';
    setTimeout(()=>{
      document.getElementById('loading-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      viewer.resize();
      // Deep linking or default
      const urlMol=new URLSearchParams(window.location.search).get('mol');
      if(urlMol) searchMolecule(urlMol);
      else loadByCID(2519,'Caffeine','Cn1cnc2c1c(=O)n(c(=O)n2C)C');
      console.log('Molecule Studio v4.0 ready!');
    },500);
  },1500);
});
